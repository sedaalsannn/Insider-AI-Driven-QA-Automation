name: Insider QA Automation

on:
  pull_request:
    branches: [main, master, develop]
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Allure CLI
        run: |
          curl -o allure.tgz -Ls https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxvf allure.tgz -C /opt/
          ln -s /opt/allure-2.27.0/bin/allure /usr/local/bin/allure

      - name: Run tests
        env:
          BROWSER: ${{ matrix.browser }}
          HEADLESS: "true"
        run: |
          pytest tests/ \
            --html=reports/report.html \
            --self-contained-html \
            --junitxml=reports/junit.xml \
            --alluredir=allure-results

      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Upload HTML + JUnit + Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            reports/report.html
            reports/junit.xml
            reports/screenshots/
          retention-days: 30

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Publish JUnit results to PR
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: reports/junit.xml
          check_name: "E2E Test Results (${{ matrix.browser }})"
          comment_mode: always

      - name: Comment PR with report link
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${emoji} **E2E Tests (${{ matrix.browser }})**: ${status}\n\n📊 [Detaylı raporu artifact'larından indirin](${runUrl})`
            });
